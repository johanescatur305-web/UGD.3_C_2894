<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://images.unsplash.com/photo-1496307042754-b4aa456c4a2d") no-repeat center center/cover;
}

.login-box{
width:320px;
padding:35px;
border-radius:15px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
box-shadow:0 8px 32px rgba(0,0,0,0.3);
text-align:center;
color:white;
}

.login-box h2{
margin-bottom:25px;
}

.input-box{
margin-bottom:15px;
}

.input-box input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2e7d32;
transform:scale(1.05);
}

#error{
margin-top:10px;
font-size:14px;
color:#ffdddd;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Sign In</h2>

<div class="input-box">
<input type="text" id="username" placeholder="Username">
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password">
</div>

<button onclick="login()">Sign In</button>

<p id="error"></p>

</div>

<script>

function login(){

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;
let error = document.getElementById("error");

if(username === "" || password === ""){
error.innerHTML = "Username atau Password tidak boleh kosong";
}
else{

window.location.href = "https://instagram.com/johan.catur305";

}

}

</script>

</body>
</html>
